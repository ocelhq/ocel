name: Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: go build (workspace)
        run: >-
          go build
          github.com/ocelhq/ocel/cli/...
          github.com/ocelhq/ocel/pkg/proto/...
          github.com/ocelhq/ocel/sdk/...
          github.com/ocelhq/ocel/cloud/aws/...

      - name: pnpm --filter @ocel/sdk build (tsc)
        run: pnpm --filter @ocel/sdk build

      - name: pnpm --filter ocel build (tsc)
        run: pnpm --filter ocel build
