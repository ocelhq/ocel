services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Stands in for the Aurora Serverless v2 cluster resolve provisions
  # against in prod (see the ocelhq-amu epic). Distinct from the `postgres`
  # service above, which is apps/web's own control-plane database - resolve
  # carves per-user role+database pairs out of this one via an admin
  # connection at OCEL_CLOUD_ADMIN_URL (see apps/web/.env.example).
  ocel-cloud:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ocel_cloud_data:/var/lib/postgresql/data

  # The dev object store: stands in for the private S3 bucket a `bucket()`
  # provisions in prod (see ocelhq-lo1). The Ocel API presigns PUTs against it
  # and the dev detection sweep HEADs it; the CLI never touches it directly.
  # Defaults match store.ts's OCEL_BLOB_* fallbacks so `pnpm test` and the dev
  # e2e work with zero config.
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: creates the shared dev bucket store.ts expects, then exits. The
  # bucket is shared across developers; tenancy isolation is by key prefix, not
  # by bucket (see the presign endpoint).
  minio-createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ocel-dev
      "

volumes:
  postgres_data:
  ocel_cloud_data:
  minio_data:
